<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Brief">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>The Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #666;
    --muted2: #999;
    --politics: #a855f7;
    --world: #3b82f6;
    --sports: #22c55e;
    --local: #f97316;
    --eats: #f59e0b;
    --entertainment: #ec4899;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }

  /* ── HEADER ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: env(safe-area-inset-top, 0px) 0 0;
  }

  .header-inner {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 16px 20px 12px;
  }

  .brand-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 0.06em;
    line-height: 1;
    color: var(--text);
  }

  .brand-meta {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
  }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted2);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .refresh-btn:active { opacity: 0.5; }
  .refresh-btn.spinning { animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 6px;
    padding: 0 20px 12px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid var(--border);
    color: var(--muted);
    background: none;
    transition: all 0.15s;
  }
  .tab:active { opacity: 0.6; }
  .tab.active                   { color: var(--text);     background: var(--surface2); border-color: rgba(255,255,255,0.15); }
  .tab[data-cat="politics"].active { color: var(--politics); background: rgba(168,85,247,0.12); border-color: rgba(168,85,247,0.3); }
  .tab[data-cat="world"].active    { color: var(--world);    background: rgba(59,130,246,0.12);  border-color: rgba(59,130,246,0.3); }
  .tab[data-cat="sports"].active   { color: var(--sports);   background: rgba(34,197,94,0.12);   border-color: rgba(34,197,94,0.3); }
  .tab[data-cat="local"].active    { color: var(--local);    background: rgba(249,115,22,0.12);  border-color: rgba(249,115,22,0.3); }
  .tab[data-cat="eats"].active          { color: var(--eats);          background: rgba(245,158,11,0.12);  border-color: rgba(245,158,11,0.3); }
  .tab[data-cat="entertainment"].active { color: var(--entertainment);  background: rgba(236,72,153,0.12);  border-color: rgba(236,72,153,0.3); }

  /* ── CONTENT ── */
  .content {
    padding: 16px 16px 40px;
    max-width: 600px;
    margin: 0 auto;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 20px 4px 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label:first-child { padding-top: 4px; }
  .section-label-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .section-label[data-cat="politics"] .section-label-dot { background: var(--politics); }
  .section-label[data-cat="world"]    .section-label-dot { background: var(--world); }
  .section-label[data-cat="sports"]   .section-label-dot { background: var(--sports); }
  .section-label[data-cat="local"]    .section-label-dot { background: var(--local); }
  .section-label[data-cat="eats"]          .section-label-dot { background: var(--eats); }
  .section-label[data-cat="entertainment"] .section-label-dot { background: var(--entertainment); }

  /* ── TOP STORY CARD ── */
  .top-story {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: background 0.12s;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .top-story:active { background: var(--surface2); }

  .top-story-img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    display: block;
    background: var(--surface2);
  }

  .top-story-body {
    padding: 14px 16px;
  }

  .top-story-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .top-story-headline {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.35;
    color: var(--text);
    margin-bottom: 8px;
  }

  .top-story-summary {
    font-size: 13px;
    line-height: 1.6;
    color: var(--muted2);
  }

  /* ── STANDARD CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    overflow: hidden;
    cursor: pointer;
    display: flex;
    align-items: stretch;
    transition: background 0.12s;
    text-decoration: none;
    color: inherit;
  }
  .card:active { background: var(--surface2); }

  .card-bar {
    width: 3px;
    flex-shrink: 0;
  }
  .card[data-cat="politics"] .card-bar { background: var(--politics); }
  .card[data-cat="world"]    .card-bar { background: var(--world); }
  .card[data-cat="sports"]   .card-bar { background: var(--sports); }
  .card[data-cat="local"]    .card-bar { background: var(--local); }
  .card[data-cat="eats"]          .card-bar { background: var(--eats); }
  .card[data-cat="entertainment"] .card-bar { background: var(--entertainment); }

  .card-body {
    padding: 11px 12px;
    flex: 1;
    min-width: 0;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 5px;
  }

  .cat-pill {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 3px;
  }
  .card[data-cat="politics"] .cat-pill { color: var(--politics); background: rgba(168,85,247,0.12); }
  .card[data-cat="world"]    .cat-pill { color: var(--world);    background: rgba(59,130,246,0.12); }
  .card[data-cat="sports"]   .cat-pill { color: var(--sports);   background: rgba(34,197,94,0.12); }
  .card[data-cat="local"]    .cat-pill { color: var(--local);    background: rgba(249,115,22,0.12); }
  .card[data-cat="eats"]          .cat-pill { color: var(--eats);          background: rgba(245,158,11,0.12); }
  .card[data-cat="entertainment"] .cat-pill { color: var(--entertainment);  background: rgba(236,72,153,0.12); }

  .card-time {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    margin-left: auto;
    flex-shrink: 0;
  }

  .source-tag {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .card-headline {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text);
    margin-bottom: 4px;
  }

  .card-summary {
    font-size: 12px;
    line-height: 1.6;
    color: var(--muted2);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-summary.expanded {
    display: block;
    overflow: visible;
    -webkit-line-clamp: unset;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
    gap: 8px;
  }
  .expand-btn {
    background: none;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--muted);
    cursor: pointer;
    padding: 0;
    flex-shrink: 0;
  }

  .read-more {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--muted2);
    margin-top: 8px;
  }

  .card-thumb {
    width: 72px;
    object-fit: cover;
    flex-shrink: 0;
    display: block;
    background: var(--surface2);
  }

  /* ── SKELETON ── */
  .skel-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
  }
  .skel-line {
    background: var(--surface2);
    border-radius: 4px;
    margin-bottom: 7px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.35} 50%{opacity:0.7} }

  /* ── EMPTY / ERROR ── */
  .empty-state {
    text-align: center;
    padding: 64px 24px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 36px; margin-bottom: 14px; }
  .empty-state .msg { font-size: 13px; line-height: 1.6; }
  .empty-state .retry-btn {
    margin-top: 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted2);
    padding: 8px 20px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
  }

  /* ── LAST UPDATED / CAUGHT UP ── */
  .last-updated {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    color: var(--muted);
    padding: 24px 0 8px;
  }

  .caught-up {
    text-align: center;
    padding: 32px 24px 48px;
    color: var(--muted);
  }
  .caught-up .cu-icon { font-size: 28px; margin-bottom: 10px; }
  .caught-up .cu-msg {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .caught-up .cu-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    line-height: 1.5;
  }

  /* ── LOAD MORE SPINNER ── */
  .load-more-spinner {
    text-align: center;
    padding: 24px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── FONT SIZE VARIANTS ── */
  body.font-large .card-headline      { font-size: 15px; }
  body.font-large .card-summary       { font-size: 13px; }
  body.font-large .top-story-headline { font-size: 20px; }
  body.font-large .top-story-summary  { font-size: 15px; }
  body.font-small .card-headline      { font-size: 11px; }
  body.font-small .card-summary       { font-size: 10px; }
  body.font-small .top-story-headline { font-size: 14px; }
  body.font-small .top-story-summary  { font-size: 11px; }

  /* ── FONT SIZE BUTTON ── */
  .font-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted2);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .font-btn:active { opacity: 0.5; }

  /* ── BOOKMARK ── */
  .card { position: relative; }
  .card.bookmarked .card-time::after { content: ' ★'; color: #f59e0b; font-size: 8px; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 1000;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── SAVED TAB ── */
  .tab[data-cat="saved"].active { color: #f59e0b; background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.3); }

  /* ── STALE DATA INDICATOR ── */
  .brand-meta.stale { color: #f59e0b; }
  .brand-meta.old   { color: #ef4444; }

</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <div class="brand-title">THE BRIEF</div>
      <div class="brand-meta" id="header-date">Cobble Hill, Brooklyn</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="font-btn" id="font-btn" onclick="cycleFont()" title="Font size">A</button>
      <button class="refresh-btn" id="refresh-btn" onclick="loadNews(true)" title="Refresh">↻</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" data-cat="all"           onclick="setTab('all')">All</button>
    <button class="tab"        data-cat="politics"      onclick="setTab('politics')">Politics</button>
    <button class="tab"        data-cat="local"         onclick="setTab('local')">Local NY</button>
    <button class="tab"        data-cat="eats"          onclick="setTab('eats')">Eats</button>
    <button class="tab"        data-cat="entertainment" onclick="setTab('entertainment')">Entertainment</button>
    <button class="tab"        data-cat="sports"        onclick="setTab('sports')">Sports</button>
    <button class="tab"        data-cat="world"         onclick="setTab('world')">World</button>
    <button class="tab"        data-cat="saved"         onclick="setTab('saved')">Saved ★</button>
  </div>
</div>

<div class="content" id="content"></div>

<script>
  const CACHE_KEY  = 'brief_v8_data';
  const CACHE_TS   = 'brief_v8_ts';
  const CACHE_TTL  = 2 * 60 * 60 * 1000;
  const BATCH_SIZE = 6;
  const SAVED_KEY  = 'brief_bookmarks';
  const FONT_KEY   = 'brief_font';
  const FONT_SIZES = ['', 'font-large', 'font-small'];
  const TAB_ORDER  = ['all', 'politics', 'local', 'eats', 'entertainment', 'sports', 'world', 'saved'];

  let data = null;
  let activeTab = sessionStorage.getItem('activeTab') || 'all';
  let shownCount = 0;
  let scrollObserver = null;
  let longPressTimer = null;
  let longPressTriggered = false;

  // ── FONT SIZE ──
  function applyFont() {
    FONT_SIZES.forEach(c => { if (c) document.body.classList.remove(c); });
    const s = localStorage.getItem(FONT_KEY) || '';
    if (s) document.body.classList.add(s);
  }
  function cycleFont() {
    const cur = localStorage.getItem(FONT_KEY) || '';
    const next = FONT_SIZES[(FONT_SIZES.indexOf(cur) + 1) % FONT_SIZES.length];
    localStorage.setItem(FONT_KEY, next);
    applyFont();
  }
  applyFont();

  // ── BOOKMARKS ──
  function getSaved() {
    try { return JSON.parse(localStorage.getItem(SAVED_KEY) || '[]'); } catch { return []; }
  }
  function isBookmarked(id) { return getSaved().some(a => a.id === id); }
  function toggleBookmark(article) {
    const saved = getSaved();
    const idx = saved.findIndex(a => a.id === article.id);
    if (idx >= 0) saved.splice(idx, 1); else saved.unshift(article);
    localStorage.setItem(SAVED_KEY, JSON.stringify(saved.slice(0, 100)));
  }
  function findArticle(id) {
    if (data?.all) { const f = data.all.find(a => a.id === id); if (f) return f; }
    return getSaved().find(a => a.id === id) || null;
  }

  // ── TOAST ──
  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 1800);
  }

  // ── DATE HEADER ──
  function updateHeader() {
    const d = new Date();
    const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('header-date').textContent =
      `Cobble Hill, Brooklyn · ${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}`;
  }
  updateHeader();

  // ── TIME AGO ──
  function timeAgo(iso) {
    const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (diff < 60)    return 'Just now';
    if (diff < 3600)  return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
    const d = new Date(iso);
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[d.getMonth()]} ${d.getDate()}`;
  }

  // ── CATEGORY LABELS ──
  const CAT_LABELS = { politics: 'Politics', world: 'World', sports: 'Sports', local: 'Local NY', eats: 'Eats', entertainment: 'Entertainment', saved: 'Saved' };
  const CAT_ICONS  = { politics: '🗳', world: '🌍', sports: '⚽', local: '🗽', eats: '🍽', entertainment: '🎬', saved: '★' };

  // ── ARTICLE FILTER (today + last 24h so nothing from the day gets cut off) ──
  function getArticles() {
    if (activeTab === 'saved') return getSaved();
    const cutoff = Date.now() - 24 * 60 * 60 * 1000;
    const pool = activeTab === 'all' ? (data.all || []) : (data[activeTab] || []);
    return pool.filter(a => new Date(a.time).getTime() > cutoff);
  }

  // ── RENDER TOP STORY ──
  function renderTopStory(a) {
    const img = a.thumbnail
      ? `<img class="top-story-img" src="${a.thumbnail}" alt="" loading="lazy" onerror="this.style.display='none'">`
      : '';
    const summary = a.summary
      ? `<div class="top-story-summary">${a.summary}</div><div class="read-more">Read full article →</div>`
      : '<div class="read-more">Read full article →</div>';
    return `
      <a class="top-story" data-cat="${a.category}" data-aid="${encodeURIComponent(a.id)}" href="${escUrl(a.url)}" target="_blank" rel="noopener noreferrer">
        ${img}
        <div class="top-story-body">
          <div class="top-story-meta">
            <span class="cat-pill" style="
              color: var(--${a.category});
              background: rgba(${catRgb(a.category)},0.12);
              font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.1em;
              text-transform:uppercase;padding:2px 7px;border-radius:3px;">
              ${CAT_ICONS[a.category]} ${CAT_LABELS[a.category]}
            </span>
            ${srcTag(a)}
            <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-left:auto;">${timeAgo(a.time)}</span>
          </div>
          <div class="top-story-headline">${a.headline}</div>
          ${summary}
        </div>
      </a>`;
  }

  // ── RENDER CARD ──
  function renderCard(a) {
    const bmClass = isBookmarked(a.id) ? ' bookmarked' : '';
    const footer = a.summary
      ? `<div class="card-summary">${a.summary}</div>
         <div class="card-footer">
           <span class="expand-btn">more ↓</span>
           <span class="read-more">Read full article →</span>
         </div>`
      : `<div class="card-footer"><span class="read-more">Read full article →</span></div>`;
    return `
      <a class="card${bmClass}" data-cat="${a.category}" data-aid="${encodeURIComponent(a.id)}" href="${escUrl(a.url)}" target="_blank" rel="noopener noreferrer">
        <div class="card-bar"></div>
        <div class="card-body">
          <div class="card-meta">
            <span class="cat-pill">${CAT_LABELS[a.category]}</span>
            ${srcTag(a)}
            <span class="card-time">${timeAgo(a.time)}</span>
          </div>
          <div class="card-headline">${a.headline}</div>
          ${footer}
        </div>
      </a>`;
  }

  // ── CAUGHT UP FOOTER ──
  function caughtUpHtml() {
    const d = new Date();
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `
      <div class="caught-up">
        <div class="cu-icon">✓</div>
        <div class="cu-msg">You're all caught up</div>
        <div class="cu-sub">${months[d.getMonth()]} ${d.getDate()} · AP · ESPN · BBC · more</div>
        <button class="retry-btn" style="margin-top:14px" onclick="loadNews(true)">↻ Check for new stories</button>
      </div>`;
  }

  // ── INFINITE SCROLL: append next batch ──
  function appendBatch() {
    const articles = getArticles();
    const batch = articles.slice(shownCount, shownCount + BATCH_SIZE);
    if (!batch.length) return;

    const sentinel = document.getElementById('scroll-sentinel');
    const html = batch.map((a, i) => (shownCount + i === 0) ? renderTopStory(a) : renderCard(a)).join('');
    sentinel.insertAdjacentHTML('beforebegin', html);
    shownCount += batch.length;

    if (shownCount >= articles.length) {
      sentinel.outerHTML = caughtUpHtml();
      if (scrollObserver) { scrollObserver.disconnect(); scrollObserver = null; }
    }
  }

  // ── RENDER FEED (full reset) ──
  function renderFeed() {
    if (!data && activeTab !== 'saved') return;
    shownCount = 0;
    if (scrollObserver) { scrollObserver.disconnect(); scrollObserver = null; }

    const el = document.getElementById('content');
    const articles = getArticles();

    if (!articles.length) {
      el.innerHTML = emptyState('No stories from today yet.<br>Try refreshing later.');
      return;
    }

    el.innerHTML = '<div id="scroll-sentinel" style="height:1px"></div>';
    appendBatch();

    scrollObserver = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting) appendBatch();
    }, { rootMargin: '400px' });

    const sentinel = document.getElementById('scroll-sentinel');
    if (sentinel) scrollObserver.observe(sentinel);
  }

  // ── SKELETON ──
  function showSkeleton() {
    const lines = (w, h=12) =>
      `<div class="skel-line" style="width:${w};height:${h}px;"></div>`;
    const card = `
      <div class="skel-card">
        <div style="display:flex;gap:6px;margin-bottom:8px;">
          ${lines('50px',8)} ${lines('30px',8)}
        </div>
        ${lines('100%',14)} ${lines('80%',14)} ${lines('100%',10)} ${lines('70%',10)}
      </div>`;
    document.getElementById('content').innerHTML = Array(5).fill(card).join('');
  }

  // ── EMPTY / ERROR ──
  function emptyState(msg = "No stories right now.<br>Try refreshing.") {
    return `
      <div class="empty-state">
        <div class="icon">📭</div>
        <div class="msg">${msg}</div>
        <button class="retry-btn" onclick="loadNews(true)">↻ Refresh</button>
      </div>`;
  }

  // ── TAB SWITCH ──
  function setTab(cat) {
    activeTab = cat;
    sessionStorage.setItem('activeTab', cat);
    document.querySelectorAll('.tab').forEach(t =>
      t.classList.toggle('active', t.dataset.cat === cat));
    if (data || cat === 'saved') {
      renderFeed();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  }

  // ── GENERATED-AT LABEL ──
  function showGeneratedAt(isoStr) {
    if (!isoStr) return;
    const label = document.getElementById('header-date');
    const diffMin = Math.floor((Date.now() - new Date(isoStr)) / 60000);
    const ago = diffMin < 2 ? 'just now' : diffMin < 60 ? `${diffMin}m ago` : `${Math.floor(diffMin / 60)}h ago`;
    const d = new Date();
    const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    label.textContent = `Cobble Hill · ${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()} · updated ${ago}`;
    label.className = 'brand-meta' + (diffMin > 120 ? ' old' : diffMin > 60 ? ' stale' : '');
  }

  // ── FETCH ──
  async function loadNews(forceRefresh = false) {
    // Restore active tab highlight on initial load
    document.querySelectorAll('.tab').forEach(t =>
      t.classList.toggle('active', t.dataset.cat === activeTab));

    if (!forceRefresh) {
      try {
        const ts = parseInt(localStorage.getItem(CACHE_TS) || '0', 10);
        if (Date.now() - ts < CACHE_TTL) {
          const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
          if (cached?.all?.length) {
            data = cached;
            showGeneratedAt(cached.generatedAt);
            renderFeed();
            return;
          }
        }
      } catch(e) {}
    }

    showSkeleton();
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');

    try {
      const res = await fetch('/.netlify/functions/news-fetch');
      const json = await res.json();

      if (json.loading) {
        document.getElementById('content').innerHTML = `
          <div class="empty-state">
            <div class="icon">⏳</div>
            <div class="msg">Generating your briefings...<br>This takes about 2 minutes the first time.<br>This page will retry automatically.</div>
          </div>`;
        setTimeout(() => loadNews(true), 20000);
        return;
      }

      if (json.error) {
        document.getElementById('content').innerHTML = emptyState(json.error);
        return;
      }

      data = json;
      showGeneratedAt(json.generatedAt);
      try {
        localStorage.setItem(CACHE_KEY, JSON.stringify(data));
        localStorage.setItem(CACHE_TS, String(Date.now()));
      } catch(e) {}
      renderFeed();
    } catch(err) {
      document.getElementById('content').innerHTML =
        emptyState("Couldn't reach the server.<br>Check your connection.");
    } finally {
      btn.classList.remove('spinning');
    }
  }

  // ── HELPERS ──
  function srcTag(a) {
    const list = a.sources || (a.source ? [a.source] : []);
    if (!list.length) return '';
    const label = list.slice(0, 3).join(' · ') + (list.length > 3 ? ` +${list.length - 3}` : '');
    return `<span class="source-tag">${label}</span>`;
  }

  function escUrl(s) {
    if (!s) return '#';
    return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
  }

  // ── EXPAND SUMMARY TOGGLE ──
  function toggleSummary(btn) {
    const summary = btn.closest('.card-body').querySelector('.card-summary');
    const expanded = summary.classList.toggle('expanded');
    btn.textContent = expanded ? 'less ↑' : 'more ↓';
  }

  // ── ARTICLE CLICK ──
  document.getElementById('content').addEventListener('click', function(e) {
    if (longPressTriggered) { longPressTriggered = false; e.preventDefault(); return; }
    const expandBtn = e.target.closest('.expand-btn');
    if (expandBtn) {
      e.preventDefault();
      e.stopPropagation();
      toggleSummary(expandBtn);
      return;
    }
    const a = e.target.closest('a[href]');
    if (!a || !a.href.startsWith('http')) return;
    e.preventDefault();
    const w = window.open(a.href, '_blank', 'noopener,noreferrer');
    if (!w || w.closed) window.location.href = a.href;
  });

  // ── LONG-PRESS TO BOOKMARK ──
  const contentEl = document.getElementById('content');
  contentEl.addEventListener('touchstart', e => {
    const card = e.target.closest('a[data-aid]');
    if (!card) return;
    longPressTimer = setTimeout(() => {
      longPressTriggered = true;
      const id = decodeURIComponent(card.dataset.aid);
      const article = findArticle(id);
      if (!article) return;
      toggleBookmark(article);
      const bm = isBookmarked(id);
      card.classList.toggle('bookmarked', bm);
      if (navigator.vibrate) navigator.vibrate(50);
      showToast(bm ? '★ Saved' : 'Removed from saved');
      if (activeTab === 'saved') renderFeed();
    }, 600);
  }, { passive: true });
  contentEl.addEventListener('touchend',  () => clearTimeout(longPressTimer), { passive: true });
  contentEl.addEventListener('touchmove', () => clearTimeout(longPressTimer), { passive: true });

  // ── SWIPE BETWEEN TABS ──
  let swipeStartX = 0, swipeStartY = 0;
  document.addEventListener('touchstart', e => {
    swipeStartX = e.touches[0].clientX;
    swipeStartY = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - swipeStartX;
    const dy = e.changedTouches[0].clientY - swipeStartY;
    if (Math.abs(dx) < 55 || Math.abs(dx) < Math.abs(dy) * 1.6) return;
    const idx = TAB_ORDER.indexOf(activeTab);
    if (dx < 0 && idx < TAB_ORDER.length - 1) setTab(TAB_ORDER[idx + 1]);
    if (dx > 0 && idx > 0) setTab(TAB_ORDER[idx - 1]);
  }, { passive: true });

  function catRgb(cat) {
    return { politics: '168,85,247', world: '59,130,246', sports: '34,197,94', local: '249,115,22', eats: '245,158,11', entertainment: '236,72,153' }[cat] || '255,255,255';
  }

  loadNews();
</script>
</body>
</html>
