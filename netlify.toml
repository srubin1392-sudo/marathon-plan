functionsDirectory = "C:\\marathon-plan\\netlify\\functions"
functionsDirectoryOrigin = "config-v1"
headersOrigin = "config"
redirectsOrigin = "config"
plugins = []

[build]
publish = "C:\\marathon-plan"
publishOrigin = "config"
functions = "C:\\marathon-plan\\netlify\\functions"

  [build.environment]

  [build.processing]

    [build.processing.css]

    [build.processing.html]

    [build.processing.images]

    [build.processing.js]

  [build.services]

[functions]

  [functions."*"]

  [functions."news-fetch"]
    timeout = 26

  [functions."news-summarize-background"]
    schedule = "0 */2 * * *"

[[headers]]
for = "/sw.js"

  [headers.values]
  Cache-Control = "no-cache"

[[redirects]]
from = "/news"
to = "/news-app.html"
status = 200
force = false

